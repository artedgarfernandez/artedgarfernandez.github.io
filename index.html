<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Edgar Fernández | Artista Visual Figurativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Edgar Fernández</h1>
        <div class="subhead">Arte figurativo contemporáneo</div>
    </header>

    <div class="gallery" id="gallery">
        <!-- Las obras se inyectarán con JS -->
    </div>

    <footer>
        <p>© 2026 Edgar Fernández — Todos los derechos reservados</p>
        <p style="margin-top: 0.3rem;">artedgarfernandez@gmail.com</p>
    </footer>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <div class="lightbox-content">
        <button class="close-lightbox" id="closeLightboxBtn">&times;</button>
        <img id="lightboxImg" src="" alt="Ampliación de obra">
        <div id="lightboxCaption" class="caption-lightbox"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
